#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

############
# Noctalia #
############
$ipc = qs -c noctalia-shell ipc call

# Core binds
# 0. CORE
bind = SUPER, SPACE, exec, $ipc launcher toggle #"Launcher"
bind = SUPER, C, exec, $ipc controlCenter toggle #"Control Center"
bind = SUPER, comma, exec, $ipc settings toggle #"Settings"
bind = $mainMod, F1, exec, qs -c noctalia-shell ipc call plugin:keybind-cheatsheet toggle #"keybinds Cheatsheet"

# clipboard
# bind = $mainMod, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy

# Reload waybar
# bind = $mainMod CTRL, W, exec, command killall -9 waybar && waybar

# Lock
# bind = $mainMod CTRL ALT, L, exec, command hyprlock

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal #"Terminal"
bind = $mainMod, Q, killactive, #"Close active window"
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit #"Restart Hyprland"
bind = $mainMod, E, exec, $fileManager #"File Manager"
bind = $mainMod, F, togglefloating, #"Toggle Floating"
# bind = $mainMod, space, exec, $menu
bind = $mainMod, P, pseudo, # dwindle #"Toggle Pseuso"
bind = $mainMod, J, layoutmsg, togglesplit #"Toggle Split"

# Move focus with mainMod + arrow keys
# 1. FOCUS MANAGEMENT
bind = $mainMod, left, movefocus, l #"Move Focus Left"
bind = $mainMod, right, movefocus, r #"Move Focus Right"
bind = $mainMod, up, movefocus, u #"Move Focus Up"
bind = $mainMod, down, movefocus, d #"Move Focus Down"

# Switch workspaces with mainMod + [0-9]
# 2. WORKSPACES
bind = $mainMod, 1, workspace, 1 #"Workspace 1 - Main Monitor"
bind = $mainMod, 2, workspace, 2 #"Workspace 2 - Main Monitor"
bind = $mainMod, 3, workspace, 3 #"Workspace 3 - Main Monitor"
bind = $mainMod, 4, workspace, 4 #"Workspace 4 - Second Monitor"
bind = $mainMod, 5, workspace, 5 #"Workspace 5 - Second Monitor"
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1 #"Move window to workspace 1"
bind = $mainMod SHIFT, 2, movetoworkspace, 2 #"Move window to workspace 2"
bind = $mainMod SHIFT, 3, movetoworkspace, 3 #"Move window to workspace 3"
bind = $mainMod SHIFT, 4, movetoworkspace, 4 #"Move window to workspace 4"
bind = $mainMod SHIFT, 5, movetoworkspace, 5 #"Move window to workspace 5"
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Swap Windows
bind = $mainMod ALT, left, swapwindow, l #"Swap window left"
bind = $mainMod ALT, right, swapwindow, r #"Swap window right"
bind = $mainMod ALT, up, swapwindow, u #"Swap window up"
bind = $mainMod ALT, down, swapwindow, d #"Swap window down"

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1 #"Scroll workspace up"
bind = $mainMod, mouse_up, workspace, e-1 #"Scroll workspace down"

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow #"Move window (floating)"
bindm = $mainMod, mouse:273, resizewindow #"Resize window"

# Media keys
# 3. MEDIA
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase #"Increase volume"
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease #"Decrease volume"
bindl = , XF86AudioMute, exec, $ipc volume muteOutput #"Mute volume"
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease

# Laptop multimedia keys for volume and LCD brightness
# bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
# bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
# bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
# bindl = , XF86AudioNext, exec, playerctl next
# bindl = , XF86AudioPause, exec, playerctl play-pause
# bindl = , XF86AudioPlay, exec, playerctl play-pause
# bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Assign workspaces to DP-2
workspace = 1, monitor:DP-2, name:DP1, persistent:true
workspace = 2, monitor:DP-2, name:DP2, persistent:true
workspace = 3, monitor:DP-2, name:DP3, persistent:true

# Assign workspaces to HDMI-A-1
workspace = 4, monitor:HDMI-A-1, name:HDMI1, persistent:true
workspace = 5, monitor:HDMI-A-1, name:HDMI2, persistent:true


# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
  name = float-open-file
  match:class = xdg-desktop-portal-gtk
  # match:title = ^Open File$
  float = on
  center = on
  size = 1100 800
}

windowrule {
  name = float-pulseaudio
  match:class = org.pulseaudio.pavucontrol
  float = on
  move = 2702 41
  size = 732 1059
}
